# Claw Routine Runner — Lightweight fallback for agent routines
# Runs every 10 minutes. Triggerable via repository_dispatch from pg_cron.
#
# ⚠️ NOTE: This runs routines WITHOUT tools (LLM text-only).
# The PRIMARY routine execution path is now through task-executor.yml
# (Phase 0.5 of execute-tasks.mjs), which converts routines into agent_tasks
# and executes them with FULL tool support (Gmail, GitHub, Sheets, etc.).
#
# This workflow serves as a FALLBACK — if the task-executor is overloaded
# or skipped, this ensures routines still get a basic execution attempt.

name: Routine Runner
on:
  schedule:
    - cron: '*/10 * * * *'  # every 10 minutes
  workflow_dispatch:          # manual trigger from GitHub UI
  repository_dispatch:        # trigger from Supabase pg_cron via pg_net
    types: [routine-runner]

concurrency:
  group: routine-runner
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run-routines:
    name: Execute Agent Routines (Lightweight)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install pg @ai-sdk/openai ai --no-save

      - name: Run agent routines
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          OLLAMA_CLOUD_KEY_1: ${{ secrets.OLLAMA_CLOUD_KEY_1 }}
          OLLAMA_CLOUD_KEY_2: ${{ secrets.OLLAMA_CLOUD_KEY_2 }}
          OLLAMA_CLOUD_KEY_3: ${{ secrets.OLLAMA_CLOUD_KEY_3 }}
          OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}
        run: node scripts/cron-runner.mjs --job agent-routines --max-routines 3

      - name: Log completion
        if: always()
        run: echo "Routine runner finished at $(date -u)"
