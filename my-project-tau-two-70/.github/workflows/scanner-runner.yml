# KlawHub Scanner Runner — Proactive External Service Scanner
# Runs every 10 minutes. Triggerable via repository_dispatch from pg_cron.
#
# This is the PULL arm of the proactive system. It reaches OUT to external services
# to detect changes and creates trigger_events for the trigger engine:
#
#   - GitHub: New issues, PRs, commits, CI failures
#   - Gmail: New unread emails (urgent/important detection)
#   - Vercel: Deployment status changes, build failures
#
# The trigger engine then matches events against user-defined triggers
# and creates agent_tasks for specialist agents.

name: Scanner Runner

on:
  schedule:
    - cron: '*/10 * * * *'  # every 10 minutes
  workflow_dispatch:
    inputs:
      source:
        description: 'Source to scan (github|gmail|vercel|all)'
        required: false
        default: 'all'
      dry_run:
        description: 'Dry run (no events inserted)'
        required: false
        default: 'false'
  repository_dispatch:
    types: [scanner-runner]

# Prevent concurrent executions
concurrency:
  group: scanner-runner
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  scan:
    name: Run Proactive Scanners
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install pg @ai-sdk/openai ai zod --no-save

      - name: Run scanners
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          CLAW_GITHUB_PAT: ${{ secrets.CLAW_GITHUB_PAT }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GITHUB_REPO: ${{ secrets.GITHUB_REPO }}
        run: |
          ARGS="--source ${{ github.event.inputs.source || 'all' }}"
          if [ "${{ github.event.inputs.dry_run || 'false' }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          node scripts/scanner-runner.mjs $ARGS

      - name: Log completion
        if: always()
        run: echo "Scanner runner finished at $(date -u)"
