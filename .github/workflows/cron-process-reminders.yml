name: Cron — Process Reminders

on:
  schedule:
    # Daily at 9:00 AM UTC — fire due reminders
    - cron: "0 9 * * *"
  workflow_dispatch:

concurrency:
  group: process-reminders
  cancel-in-progress: false

jobs:
  process-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci --ignore-scripts

      - name: Fire due reminders
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: node scripts/cron-runner.mjs --job process-reminders --max-reminders 20
