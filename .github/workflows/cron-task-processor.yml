name: Cron — Task Processor

on:
  schedule:
    # Every 5 minutes — evaluate automations & queue tasks
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: task-processor
  cancel-in-progress: false

jobs:
  task-processor:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci --ignore-scripts

      - name: Evaluate automations & queue tasks
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: node scripts/cron-runner.mjs --job task-processor
