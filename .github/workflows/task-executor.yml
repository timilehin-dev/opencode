# Claw Task Executor — Picks up pending tasks & project tasks from Supabase
# Runs every 2 minutes. Also triggerable via repository_dispatch from pg_cron.
#
# This is the PRIMARY execution engine — it runs outside Vercel (no timeout limits).
# It evaluates automations, executes pending agent_tasks, and processes project task graphs.

name: Task Executor
on:
  schedule:
    - cron: '*/2 * * * *'  # every 2 minutes
  workflow_dispatch:          # manual trigger from GitHub UI
  repository_dispatch:        # trigger from Supabase pg_cron via pg_net
    types: [task-executor]

# Prevent concurrent executions — if one run is still going, skip the next
concurrency:
  group: task-executor
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  execute:
    name: Run Task Executor
    runs-on: ubuntu-latest
    timeout-minutes: 10       # hard cap per job (most runs finish in 2-3 min)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run executor
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          OLLAMA_CLOUD_KEY_1: ${{ secrets.OLLAMA_CLOUD_KEY_1 }}
          OLLAMA_CLOUD_KEY_2: ${{ secrets.OLLAMA_CLOUD_KEY_2 }}
          OLLAMA_CLOUD_KEY_3: ${{ secrets.OLLAMA_CLOUD_KEY_3 }}
          OLLAMA_CLOUD_KEY_4: ${{ secrets.OLLAMA_CLOUD_KEY_4 }}
          OLLAMA_CLOUD_KEY_5: ${{ secrets.OLLAMA_CLOUD_KEY_5 }}
          OLLAMA_CLOUD_KEY_6: ${{ secrets.OLLAMA_CLOUD_KEY_6 }}
          OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          TAVILY_API_KEY_1: ${{ secrets.TAVILY_API_KEY_1 }}
          TAVILY_API_KEY_2: ${{ secrets.TAVILY_API_KEY_2 }}
          TAVILY_API_KEY_3: ${{ secrets.TAVILY_API_KEY_3 }}
          CLAW_GITHUB_PAT: ${{ secrets.CLAW_GITHUB_PAT }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

        run: node scripts/execute-tasks.mjs --tasks 5 --timeout 300 --max-steps 40

      - name: Log completion
        if: always()
        run: echo "Task executor finished at $(date -u)"
