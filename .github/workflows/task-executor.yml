# Claw Task Executor — PRIMARY execution engine for the proactive agent system
# Runs every 2 minutes. Triggerable via repository_dispatch from pg_cron.
#
# This is the HEARTBEAT of the autonomous multi-agent system. Every 2 minutes it:
#   Phase 0:   Auto-respond to unread A2A inter-agent messages
#   Phase 0.5: Convert due agent_routines into tool-capable agent_tasks
#   Phase 0.75: Process pending trigger_events → fire matching triggers → create tasks
#   Phase 1:   Evaluate automations & queue triggered tasks
#   Phase 2:   Execute pending agent_tasks with FULL tool support
#   Phase 3:   Execute project task graphs (dependency-resolved)
#   Phase 4:   Escalate/retry failed tasks
#   Phase 5:   Proactive agent self-assessment (every 30 min)
#
# Runs outside Vercel (no timeout limits). GitHub Actions gives up to 10 min/job.
# Agents get their full tool set: Gmail, GitHub, Sheets, Drive, Calendar, Web, etc.

name: Task Executor
on:
  schedule:
    - cron: '*/2 * * * *'  # every 2 minutes
  workflow_dispatch:          # manual trigger from GitHub UI
  repository_dispatch:        # trigger from Supabase pg_cron via pg_net
    types: [task-executor]

# Prevent concurrent executions
concurrency:
  group: task-executor
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  execute:
    name: Run Task Executor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install pg @ai-sdk/openai ai zod --no-save

      - name: Run executor
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          OLLAMA_CLOUD_KEY_1: ${{ secrets.OLLAMA_CLOUD_KEY_1 }}
          OLLAMA_CLOUD_KEY_2: ${{ secrets.OLLAMA_CLOUD_KEY_2 }}
          OLLAMA_CLOUD_KEY_3: ${{ secrets.OLLAMA_CLOUD_KEY_3 }}
          OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          TAVILY_API_KEY_1: ${{ secrets.TAVILY_API_KEY_1 }}
          TAVILY_API_KEY_2: ${{ secrets.TAVILY_API_KEY_2 }}
          CLAW_GITHUB_PAT: ${{ secrets.CLAW_GITHUB_PAT }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

        run: node scripts/execute-tasks.mjs --tasks 5 --timeout 300 --max-steps 40

      - name: Log completion
        if: always()
        run: echo "Task executor finished at $(date -u)"
