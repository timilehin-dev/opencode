# Klawhub Cron Jobs — runs via GitHub Actions (Vercel free plan has no cron)
#
# Jobs:
#   1. agent-routines    — Every 30 min — execute due agent routines via API
#   2. task-processor    — Every 5 min  — evaluate automations & queue tasks
#   3. process-reminders — Daily at 9am — fire due reminders
#
# These hit the production API endpoint (klawhub.xyz) which has full
# agent tool support (Gmail, GitHub, Sheets, etc.)

name: Klawhub Cron Jobs

on:
  schedule:
    # Agent routines — every 30 minutes
    - cron: "*/30 * * * *"
    # Task processor — every 5 minutes
    - cron: "*/5 * * * *"
    # Process reminders — daily at 9:00 AM UTC
    - cron: "0 9 * * *"

  # Allow manual triggering from GitHub UI
  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - agent-routines
          - task-processor
          - process-reminders

jobs:
  agent-routines:
    name: Agent Routines
    runs-on: ubuntu-latest
    # Only run on the agent-routines schedule or when explicitly selected
    if: |
      github.event.schedule == '*/30 * * * *' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'agent-routines' || github.event.inputs.job == 'all')
    steps:
      - name: Execute Agent Routines
        run: |
          echo "[$(date -u)] Triggering agent routines..."
          RESPONSE=$(curl -s -f -w "\n%{http_code}" \
            "${{ secrets.KLAWHUB_CRON_URL }}/api/cron/agent-routines?secret=${{ secrets.CRON_SECRET }}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::API returned HTTP $HTTP_CODE"
            exit 1
          fi

  task-processor:
    name: Task Processor
    runs-on: ubuntu-latest
    if: |
      github.event.schedule == '*/5 * * * *' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'task-processor' || github.event.inputs.job == 'all')
    steps:
      - name: Process Automations & Tasks
        run: |
          echo "[$(date -u)] Processing task queue..."
          RESPONSE=$(curl -s -f -w "\n%{http_code}" \
            "${{ secrets.KLAWHUB_CRON_URL }}/api/cron/task-processor?secret=${{ secrets.CRON_SECRET }}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::warning::API returned HTTP $HTTP_CODE"
          fi

  process-reminders:
    name: Process Reminders
    runs-on: ubuntu-latest
    if: |
      github.event.schedule == '0 9 * * *' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'process-reminders' || github.event.inputs.job == 'all')
    steps:
      - name: Fire Due Reminders
        run: |
          echo "[$(date -u)] Processing reminders..."
          RESPONSE=$(curl -s -f -w "\n%{http_code}" \
            "${{ secrets.KLAWHUB_CRON_URL }}/api/cron/process-reminders?secret=${{ secrets.CRON_SECRET }}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::warning::API returned HTTP $HTTP_CODE"
          fi
