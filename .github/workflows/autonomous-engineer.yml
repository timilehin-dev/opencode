# KlawHub Autonomous Engineer — Chief Intelligence Loop
# Runs at 9:00 AM and 9:00 PM WAT (Africa/Lagos).
#
# Phase 2: Full autonomous action capability.
# The engineer monitors the system, uses LLM to plan actions, creates tasks
# for specialist agents, sends A2A messages, and notifies the user.
#
# Modes: full (default), monitor, llm-plan (dry-run), act (no LLM), report

name: Autonomous Engineer
on:
  schedule:
    - cron: '0 8 * * *'   # 9:00 AM WAT (UTC+1)
    - cron: '0 20 * * *'  # 9:00 PM WAT (UTC+1)
  workflow_dispatch:       # manual trigger from GitHub UI
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - monitor
          - llm-plan
          - act
          - report

concurrency:
  group: autonomous-engineer
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  # ── Job 1: Chief Intelligence Loop ──────────────────────────────────────
  engineer:
    name: Chief Intelligence Loop
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Autonomous Engineer
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          OLLAMA_CLOUD_KEY_1: ${{ secrets.OLLAMA_CLOUD_KEY_1 }}
          OLLAMA_CLOUD_KEY_2: ${{ secrets.OLLAMA_CLOUD_KEY_2 }}
          OLLAMA_CLOUD_KEY_3: ${{ secrets.OLLAMA_CLOUD_KEY_3 }}
          OLLAMA_CLOUD_KEY_4: ${{ secrets.OLLAMA_CLOUD_KEY_4 }}
          OLLAMA_CLOUD_KEY_5: ${{ secrets.OLLAMA_CLOUD_KEY_5 }}
          OLLAMA_CLOUD_KEY_6: ${{ secrets.OLLAMA_CLOUD_KEY_6 }}
          OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODE: ${{ github.event.inputs.mode || 'full' }}
        run: node scripts/autonomous-engineer.mjs

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engineer-report-${{ github.run_number }}
          path: /tmp/engineer-report.json
          retention-days: 7

  # ── Job 2: Build Verification ──────────────────────────────────────────
  build-check:
    name: Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run TypeScript build
        run: npm run build 2>&1 | tee /tmp/build-output.txt

      - name: Check for build errors
        if: failure()
        run: |
          echo "::error::Build failed! Output saved to artifact."

      - name: Upload build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ github.run_number }}
          path: /tmp/build-output.txt
          retention-days: 3
