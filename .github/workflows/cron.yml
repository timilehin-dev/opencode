name: Claw Cron Jobs (Vercel)

on:
  schedule:
    # Only process reminders via Vercel (every 5 minutes)
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  process-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Reminder Processor
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X GET "https://my-project-lilac-pi-90.vercel.app/api/cron/process-reminders"
